<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Board Dark Kitchen</title>
<style>
:root{--bg:#081120;--panel:rgba(15,23,42,0.88);--text:#e2e8f0;--muted:#94a3b8;--line:rgba(255,255,255,0.08);}
body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text);}
.page{width:min(1500px,95%);margin:0 auto;padding:20px 34px;}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:20px 22px;background:var(--panel);border-radius:28px;margin-bottom:18px;}
.topbar h1{margin:0;font-size:clamp(1.8rem,3vw,2.6rem);}
.topbar p{margin:6px 0 0;color:var(--muted);}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.column{background:var(--panel);border-radius:24px;padding:14px;min-height:70vh;}
.column-header{display:flex;justify-content:space-between;align-items:center;gap:10px;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--line);font-weight:900;}
.cards{display:grid;gap:12px;}
.order-card{background:#0f172a;border-radius:18px;padding:14px;border-left:7px solid #cbd5e1;}
.order-card.Nueva{border-left-color:#2563eb;}
.order-card.Preparando{border-left-color:#f59e0b;}
.order-card.Preparada{border-left-color:#22c55e;}
.order-card.Entregada{border-left-color:#06b6d4;}
.order-card.Cancelada{border-left-color:#ef4444;}
.card-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px;}
.client{font-weight:900;font-size:1rem;}
.time{color:#64748b;font-size:0.78rem;font-weight:700;}
.product{font-weight:800;margin-bottom:6px;}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 10px;}
.badge{padding:6px 9px;border-radius:999px;font-size:0.76rem;font-weight:800;}
.badge-id{background:#dbeafe;color:#1d4ed8;}
.badge-empaque{background:#eff6ff;color:#2563eb;}
.badge-pago{background:#fff7ed;color:#c2410c;}
.amount{font-weight:900;margin-bottom:10px;}
select{width:100%;padding:10px 11px;border-radius:12px;border:1px solid #cbd5e1;background:white;font-weight:800;}
.summary{margin-top:18px;padding:14px;background:var(--panel);border-radius:18px;display:flex;justify-content:space-around;gap:20px;}
.summary div{font-weight:900;font-size:1rem;}
.empty{padding:22px 12px;text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,0.16);border-radius:16px;background:rgba(255,255,255,0.02);}
@media(max-width:1450px){.board{grid-template-columns:repeat(3,1fr);}}
@media(max-width:980px){.board{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.board{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="page">
<section class="topbar">
<div><h1>Chef Board</h1><p>Control de pedidos con sumatoria diaria por método de pago</p></div>
<div id="lastUpdate">Actualizando...</div>
</section>

<section class="board">
<div class="column"><div class="column-header">Nueva <span id="pillNueva">0</span></div><div class="cards" id="cardsNueva"></div></div>
<div class="column"><div class="column-header">Preparando <span id="pillPreparando">0</span></div><div class="cards" id="cardsPreparando"></div></div>
<div class="column"><div class="column-header">Preparada <span id="pillPreparada">0</span></div><div class="cards" id="cardsPreparada"></div></div>
<div class="column"><div class="column-header">Entregada <span id="pillEntregada">0</span></div><div class="cards" id="cardsEntregada"></div></div>
</section>

<div class="summary">
<div>Total: <span id="totalMonto">₡0</span></div>
<div>Efectivo: <span id="totalEfectivo">₡0</span></div>
<div>SINPE: <span id="totalSINPE">₡0</span></div>
</div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyo-VlyleZfK_Oyhb6XLG4cQh41IHSBaWX7RL2CjDwjT8AxptdscBjjt4Ty4Q6S0QNV/exec';
const REFRESH_MS=8000;

async function fetchOrders(){
  const res=await fetch(`${SCRIPT_URL}?action=list`,{cache:'no-store'});
  const data=await res.json();
  return data||[];
}

function renderOrders(orders){
  const columns={Nueva:document.getElementById('cardsNueva'),Preparando:document.getElementById('cardsPreparando'),Preparada:document.getElementById('cardsPreparada'),Entregada:document.getElementById('cardsEntregada')};
  for(let col in columns) columns[col].innerHTML='';

  let total=0, efectivo=0, sinpe=0;
  orders.forEach(o=>{
    total+=o.monto;
    if(o.pago==='Efectivo') efectivo+=o.monto; else if(o.pago==='SINPE') sinpe+=o.monto;

    const div=document.createElement('div'); div.className=`order-card ${o.estado}`;
    div.innerHTML=`<div class="card-top"><div class="client">${o.cliente}</div><div class="time">${o.fecha}</div></div>
    <div class="product">${o.cantidad} x ${o.producto}</div>
    <div class="badges"><span class="badge badge-id">${o.id}</span><span class="badge badge-empaque">Empaque: ${o.empaque}</span><span class="badge badge-pago">${o.pago}</span></div>
    <div class="amount">₡${o.monto}</div>
    <select data-id="${o.id}">
      <option value="Nueva"${o.estado==='Nueva'?' selected':''}>Nueva</option>
      <option value="Preparando"${o.estado==='Preparando'?' selected':''}>Preparando</option>
      <option value="Preparada"${o.estado==='Preparada'?' selected':''}>Preparada</option>
      <option value="Entregada"${o.estado==='Entregada'?' selected':''}>Entregada</option>
      <option value="Cancelada"${o.estado==='Cancelada'?' selected':''}>Cancelada</option>
    </select>`;
    div.querySelector('select').addEventListener('change',async e=>{
      const newStatus=e.target.value;
      const id=e.target.getAttribute('data-id');
      await fetch(SCRIPT_URL,{method:'POST',body:new URLSearchParams({action:'updateStatus',id,estado:newStatus})});
      updateBoard();
    });
    columns[o.estado].appendChild(div);
  });

  document.getElementById('pillNueva').textContent=orders.filter(o=>o.estado==='Nueva').length;
  document.getElementById('pillPreparando').textContent=orders.filter(o=>o.estado==='Preparando').length;
  document.getElementById('pillPreparada').textContent=orders.filter(o=>o.estado==='Preparada').length;
  document.getElementById('pillEntregada').textContent=orders.filter(o=>o.estado==='Entregada').length;

  document.getElementById('totalMonto').textContent=`₡${total}`;
  document.getElementById('totalEfectivo').textContent=`₡${efectivo}`;
  document.getElementById('totalSINPE').textContent=`₡${sinpe}`;
}

async function updateBoard(){
  const orders=await fetchOrders();
  renderOrders(orders);
  document.getElementById('lastUpdate').textContent='Actualizado: '+new Date().toLocaleTimeString();
}

updateBoard();
setInterval(updateBoard,REFRESH_MS);
</script>
</body>
</html>
