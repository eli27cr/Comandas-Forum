<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comandas Dark Kitchen</title>
<style>
:root{--bg:#0b1220;--panel:#111827;--text:#f8fafc;--muted:#94a3b8;--line:rgba(255,255,255,0.08);--green:#22c55e;--green-2:#16a34a;--shadow:0 24px 50px rgba(0,0,0,0.35);}
*{box-sizing:border-box;}
body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text);}
.page{width:min(1100px,94%);margin:0 auto;padding:20px 0 28px;}
.header{background:var(--panel);border-radius:24px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:18px;}
.header h1{margin:0;font-size:clamp(1.6rem,3vw,2.4rem);}
.header p{margin:6px 0 0;color:var(--muted);}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.card{background:var(--panel);border-radius:24px;box-shadow:var(--shadow);padding:20px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr); gap:12px;margin-top:18px;}
.stat{background:rgba(255,255,255,0.04);border:1px solid var(--line);border-radius:18px;padding:16px;}
.stat-label{color:var(--muted); font-size:0.9rem; margin-bottom:8px;}
.stat-value{font-size:1.7rem; font-weight:900; line-height:1;}
form{display:grid; gap:14px; margin-top:14px;}
.field{display:grid; gap:7px;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
label{font-size:0.93rem; font-weight:800; color:#cbd5e1;}
input, select{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.10);background:#0f172a;color:white;font-size:1rem;outline:none;}
input[readonly]{background:#111827;color:#cbd5e1;}
input:focus, select:focus{border-color:#60a5fa;box-shadow:0 0 0 4px rgba(59,130,246,0.15);}
button{border:none;border-radius:14px;padding:15px 16px;font-size:1rem;font-weight:900;cursor:pointer;}
.btn-primary{background:linear-gradient(135deg,var(--green) 0%,var(--green-2) 100%); color:white;}
.btn-secondary{background:#1e293b;color:white;border:1px solid var(--line);}
.message{min-height:24px;margin-top:8px;color:#86efac;font-weight:800;}
.orders{display:grid;gap:12px;margin-top:12px;}
.order-card{background:#0f172a;border:1px solid var(--line);border-radius:18px;padding:14px;display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:10px;align-items:center;}
.order-main strong{display:block;margin-bottom:4px;}
.order-main span{color:var(--muted); font-size:0.92rem;}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.badge{padding:7px 10px;border-radius:999px;font-size:0.78rem;font-weight:800;}
.badge-empaque{background:rgba(59,130,246,0.15); color:#93c5fd;}
.badge-pago{background:rgba(245,158,11,0.15); color:#fcd34d;}
.badge-id{background:rgba(34,197,94,0.15); color:#86efac;}
.empty{padding:22px;text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,0.15);border-radius:16px;background:rgba(255,255,255,0.02);margin-top:12px;}
@media(max-width:900px){.layout,.row-2,.stats,.order-card{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="page">
<section class="header">
<h1>Comandas Dark Kitchen</h1>
<p>Captura rápida con productos, cantidad, empacado y pago. El chef verá todo actualizado.</p>
</section>

<section class="layout">
<section class="card hero">
<h2>Modo cocina</h2>
<div class="stats">
<div class="stat"><div class="stat-label">Comandas</div><div class="stat-value" id="totalOrders">0</div></div>
<div class="stat"><div class="stat-label">Monto</div><div class="stat-value" id="totalAmount">₡0</div></div>
<div class="stat"><div class="stat-label">Estado inicial</div><div class="stat-value">Nueva</div></div>
</div>
</section>

<section class="card form-card">
<h2>Nueva comanda</h2>
<form id="orderForm">
<div class="field"><label for="cliente">Cliente</label><input type="text" id="cliente" placeholder="Ej: María González" required></div>

<div class="row-2">
<div class="field"><label for="producto">Producto</label>
<select id="producto" required>
<option value="">Selecciona un producto</option>
</select>
</div>
<div class="field"><label for="cantidad">Cantidad</label><input type="number" id="cantidad" min="1" step="1" value="1" required></div>
</div>

<div class="row-2">
<div class="field"><label for="precio">Precio unitario</label><input type="number" id="precio" readonly></div>
<div class="field"><label for="monto">Monto total</label><input type="number" id="monto" readonly></div>
</div>

<div class="row-2">
<div class="field"><label><input type="checkbox" id="empaque"> Requiere empaque</label></div>
<div class="field"><label>Pago: <select id="pago"><option value="Efectivo">Efectivo</option><option value="SINPE">SINPE</option></select></label></div>
</div>

<div class="row-2">
<button type="submit" class="btn-primary">Guardar pedido</button>
<button type="button" class="btn-secondary" id="clearLocalBtn">Borrar locales</button>
</div>
</form>
<div class="message" id="message"></div>
</section>
</section>

<section class="card list-card">
<h2>Últimas comandas locales</h2>
<div class="orders" id="ordersContainer"></div>
</section>
</div>

<script>
const WEB_APP_URL='https://script.google.com/macros/s/AKfycbyo-VlyleZfK_Oyhb6XLG4cQh41IHSBaWX7RL2CjDwjT8AxptdscBjjt4Ty4Q6S0QNV/exec';

const form=document.getElementById('orderForm');
const clienteInput=document.getElementById('cliente');
const productoSelect=document.getElementById('producto');
const cantidadInput=document.getElementById('cantidad');
const precioInput=document.getElementById('precio');
const montoInput=document.getElementById('monto');
const empaqueInput=document.getElementById('empaque');
const pagoSelect=document.getElementById('pago');
const ordersContainer=document.getElementById('ordersContainer');
const message=document.getElementById('message');

let products=[];

function showMessage(msg){message.textContent=msg; setTimeout(()=>message.textContent='',2200);}
function formatCurrency(v){return new Intl.NumberFormat('es-CR',{style:'currency',currency:'CRC'}).format(v);}

async function loadProducts(){
  const res=await fetch(`${WEB_APP_URL}?action=products`);
  const data=await res.json();
  products=data;
  productoSelect.innerHTML='<option value="">Selecciona un producto</option>';
  products.forEach(p=>{
    const opt=document.createElement('option'); opt.value=p.producto; opt.textContent=`${p.producto} — ₡${p.precio}`; productoSelect.appendChild(opt);
  });
}

function recalc(){ 
  const product=products.find(p=>p.producto===productoSelect.value);
  const qty=parseInt(cantidadInput.value||0,10);
  if(product){precioInput.value=product.precio;montoInput.value=qty>0?product.precio*qty:0;}else{precioInput.value='';montoInput.value='';}
}

productoSelect.addEventListener('change',recalc);
cantidadInput.addEventListener('input',recalc);

function renderOrdersLocal(){
  const localOrders=JSON.parse(localStorage.getItem('comandas-local')||'[]');
  ordersContainer.innerHTML='';
  if(!localOrders.length){ordersContainer.innerHTML='<div class="empty">Todavía no hay pedidos locales.</div>'; return;}
  localOrders.forEach(o=>{
    const div=document.createElement('div');div.className='order-card';
    div.innerHTML=`<div class="order-main"><strong>${o.cliente}</strong><span>${o.cantidad} x ${o.producto}</span></div>
    <div class="badges"><span class="badge badge-empaque">${o.empaque?'Empaque':'No'} </span><span class="badge badge-pago">${o.pago}</span></div>
    <div>${formatCurrency(o.monto)}</div>`;
    ordersContainer.appendChild(div);
  });
}

form.addEventListener('submit',async e=>{
  e.preventDefault();
  const cliente=clienteInput.value.trim();
  const producto=productoSelect.value.trim();
  const cantidad=parseInt(cantidadInput.value||0,10);
  const empaque=empaqueInput.checked?'Sí':'No';
  const pago=pagoSelect.value;
  if(!cliente||!producto||cantidad<1){showMessage('Completa los campos');return;}
  const productData=products.find(p=>p.producto===producto);
  const monto=productData.precio*cantidad;
  const fecha=new Date().toLocaleString('es-CR');

  const body=new URLSearchParams({fecha,cliente,cantidad,producto,empaque,pago,estado:'Nueva'});
  const res=await fetch(WEB_APP_URL,{method:'POST',body});
  const data=await res.json();
  if(data.ok){showMessage('Pedido guardado');}
  productoSelect.value=''; cantidadInput.value=1; precioInput.value=''; montoInput.value=''; empaqueInput.checked=false;
  renderOrdersLocal();
});

loadProducts().then(()=>{cantidadInput.value=1; renderOrdersLocal();});
</script>
</body>
</html>
