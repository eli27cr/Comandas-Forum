<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chef Board Dark Kitchen</title>
  <style>
    :root{
      --bg:#081120;
      --panel:rgba(15,23,42,0.88);
      --text:#e2e8f0;
      --muted:#94a3b8;
      --line:rgba(255,255,255,0.08);
      --green:#22c55e;
      --blue:#3b82f6;
      --shadow:0 24px 50px rgba(0,0,0,0.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.10), transparent 18%),
        linear-gradient(180deg,#0f172a 0%,#081120 100%);
      color:var(--text);
    }
    .page{width:min(1400px,95%);margin:0 auto;padding:20px 34px}
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:20px 22px;
      background:var(--panel);
      border-radius:28px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }
    .topbar h1{margin:0;font-size:clamp(1.8rem,3vw,2.6rem)}
    .topbar p{margin:6px 0 0;color:var(--muted)}
    .board{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .column{
      background:var(--panel);
      border-radius:24px;
      padding:14px;
      min-height:70vh;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }
    .column-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding-bottom:10px;
      margin-bottom:12px;
      border-bottom:1px solid var(--line);
      font-weight:900;
    }
    .cards{display:grid;gap:12px}
    .order-card{
      background:#0f172a;
      border-radius:18px;
      padding:14px;
      border-left:7px solid #cbd5e1;
    }
    .order-card.Nueva{border-left-color:var(--blue)}
    .order-card.Entregada{border-left-color:var(--green)}
    .card-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}
    .client{font-weight:900;font-size:1rem}
    .time{color:#64748b;font-size:0.78rem;font-weight:700}
    .product{font-weight:800;margin-bottom:6px}
    .badges{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 10px}
    .badge{
      padding:6px 9px;
      border-radius:999px;
      font-size:0.76rem;
      font-weight:800;
    }
    .badge-id{background:#dbeafe;color:#1d4ed8}
    .badge-empaque{background:#eff6ff;color:#2563eb}
    .badge-pago{background:#fff7ed;color:#c2410c}
    .amount{font-weight:900;margin-bottom:10px}
    select{
      width:100%;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid #cbd5e1;
      background:white;
      font-weight:800;
    }
    .summary{
      margin-top:18px;
      padding:14px;
      background:var(--panel);
      border-radius:18px;
      display:flex;
      justify-content:space-around;
      gap:20px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }
    .summary div{font-weight:900;font-size:1rem}
    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:.9rem;
    }
    @media(max-width:900px){.board{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <section class="topbar">
      <div>
        <h1>Chef Board</h1>
        <p>Tablero de pedidos con 2 estados</p>
      </div>
      <div id="lastUpdate">Actualizando...</div>
    </section>

    <section class="board">
      <div class="column">
        <div class="column-header">Nueva <span id="pillNueva">0</span></div>
        <div class="cards" id="cardsNueva"></div>
      </div>

      <div class="column">
        <div class="column-header">Entregada <span id="pillEntregada">0</span></div>
        <div class="cards" id="cardsEntregada"></div>
      </div>
    </section>

    <div class="summary">
      <div>Total pendiente: <span id="totalMonto">₡0</span></div>
      <div>Efectivo pendiente: <span id="totalEfectivo">₡0</span></div>
      <div>SINPE pendiente: <span id="totalSINPE">₡0</span></div>
    </div>

    <div class="hint">
      Haz un clic en esta pantalla una vez para habilitar el sonido del navegador.
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwEVz1u4SjzZu-doeKDHytRoZJ4V87VyJjdsC2qrpg9aGXbLnO4SW08THKlNcIA5en7/exec';
    const REFRESH_MS = 5000;

    let previousPendingIds = new Set();
    let audioUnlocked = false;

    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;
    }

    document.addEventListener('click', unlockAudio, { once: true });
    document.addEventListener('touchstart', unlockAudio, { once: true });

    function playNewOrderSound() {
      if (!audioUnlocked) return;

      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;

      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(880, now);
      gain1.gain.setValueAtTime(0.0001, now);
      gain1.gain.exponentialRampToValueAtTime(0.15, now + 0.02);
      gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc1.connect(gain1).connect(ctx.destination);
      osc1.start(now);
      osc1.stop(now + 0.18);

      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(1174, now + 0.12);
      gain2.gain.setValueAtTime(0.0001, now + 0.12);
      gain2.gain.exponentialRampToValueAtTime(0.13, now + 0.14);
      gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.30);
      osc2.connect(gain2).connect(ctx.destination);
      osc2.start(now + 0.12);
      osc2.stop(now + 0.30);
    }

    async function fetchOrders() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=list`, { cache: 'no-store' });
        const data = await res.json();
        return Array.isArray(data) ? data : [];
      } catch (err) {
        console.error('Error cargando pedidos:', err);
        return [];
      }
    }

    async function updateStatus(id, estado) {
      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: new URLSearchParams({
            action: 'updateStatus',
            id,
            estado
          })
        });
      } catch (err) {
        console.error('Error actualizando estado:', err);
      }
    }

    function renderOrders(orders) {
      const nuevaContainer = document.getElementById('cardsNueva');
      const entregadaContainer = document.getElementById('cardsEntregada');

      nuevaContainer.innerHTML = '';
      entregadaContainer.innerHTML = '';

      let total = 0;
      let efectivo = 0;
      let sinpe = 0;

      orders.forEach(o => {
        const estado = o.estado === 'Entregada' ? 'Entregada' : 'Nueva';

        if (estado === 'Nueva') {
          total += Number(o.monto || 0);
          if (o.pago === 'Efectivo') efectivo += Number(o.monto || 0);
          if (o.pago === 'SINPE') sinpe += Number(o.monto || 0);
        }

        const div = document.createElement('div');
        div.className = `order-card ${estado}`;
        div.innerHTML = `
          <div class="card-top">
            <div class="client">${o.cliente || ''}</div>
            <div class="time">${o.fecha || ''}</div>
          </div>
          <div class="product">${Number(o.cantidad || 0)} x ${o.producto || ''}</div>
          <div class="badges">
            <span class="badge badge-id">${o.id || ''}</span>
            <span class="badge badge-empaque">Empaque: ${o.empaque || 'No'}</span>
            <span class="badge badge-pago">${o.pago || 'Efectivo'}</span>
          </div>
          <div class="amount">₡${Number(o.monto || 0).toLocaleString('es-CR')}</div>
          <select data-id="${o.id}">
            <option value="Nueva"${estado === 'Nueva' ? ' selected' : ''}>Nueva</option>
            <option value="Entregada"${estado === 'Entregada' ? ' selected' : ''}>Entregada</option>
          </select>
        `;

        div.querySelector('select').addEventListener('change', async e => {
          const newStatus = e.target.value;
          const id = e.target.getAttribute('data-id');
          await updateStatus(id, newStatus);
          updateBoard();
        });

        if (estado === 'Nueva') {
          nuevaContainer.appendChild(div);
        } else {
          entregadaContainer.appendChild(div);
        }
      });

      document.getElementById('pillNueva').textContent = orders.filter(o => o.estado !== 'Entregada').length;
      document.getElementById('pillEntregada').textContent = orders.filter(o => o.estado === 'Entregada').length;

      document.getElementById('totalMonto').textContent = `₡${total.toLocaleString('es-CR')}`;
      document.getElementById('totalEfectivo').textContent = `₡${efectivo.toLocaleString('es-CR')}`;
      document.getElementById('totalSINPE').textContent = `₡${sinpe.toLocaleString('es-CR')}`;
    }

    async function updateBoard() {
      const orders = await fetchOrders();

      const currentPendingIds = new Set(
        orders
          .filter(o => o.estado !== 'Entregada')
          .map(o => String(o.id))
      );

      let hasNew = false;

      if (previousPendingIds.size > 0) {
        for (const id of currentPendingIds) {
          if (!previousPendingIds.has(id)) {
            hasNew = true;
            break;
          }
        }
      }

      if (hasNew) {
        playNewOrderSound();
      }

      previousPendingIds = currentPendingIds;

      renderOrders(orders);
      document.getElementById('lastUpdate').textContent =
        'Actualizado: ' + new Date().toLocaleTimeString();
    }

    updateBoard();
    setInterval(updateBoard, REFRESH_MS);
  </script>
</body>
</html>
